name: dr_assistant1
description: "A professional medical assistant app for doctors"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Shared Preferences
  shared_preferences: ^2.2.2

  # URL Launcher (WhatsApp)
  url_launcher: ^6.2.1

  # Date Formatting
  intl: ^0.18.1

  # File Storage
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
